<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaleco Invidente</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap');
        :root { --bg:#0a0e1a; --panel:#111827; --border:#1e2d45; --green:#00e676; --yellow:#ffd600; --red:#ff1744; --text:#e0e6f0; --muted:#5a6a85; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
        h1 { font-family:'Rajdhani',sans-serif; font-size:2rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
        .subtitle { color:var(--muted); font-size:0.85rem; margin-bottom:28px; letter-spacing:1px; }
        .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:400px; margin-bottom:16px; }
        .status-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
        .dot { width:12px; height:12px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
        .dot.connected { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        #statusText { font-size:0.9rem; color:var(--muted); }
        #btnConectar { width:100%; padding:14px; font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:transparent; border:2px solid var(--green); color:var(--green); border-radius:10px; cursor:pointer; transition:all 0.2s; }
        #btnConectar:hover { background:var(--green); color:var(--bg); }
        #btnConectar:disabled { border-color:var(--muted); color:var(--muted); cursor:not-allowed; }
        #btnConectar:disabled:hover { background:transparent; }
        .aviso-card { background:var(--panel); border:2px solid var(--border); border-radius:16px; padding:32px 24px; width:100%; max-width:400px; text-align:center; margin-bottom:16px; transition:border-color 0.3s,box-shadow 0.3s; }
        .aviso-card.peligro { border-color:var(--red); box-shadow:0 0 24px rgba(255,23,68,0.3); animation:shake 0.4s; }
        .aviso-card.precaucion { border-color:var(--yellow); box-shadow:0 0 24px rgba(255,214,0,0.25); }
        .aviso-card.libre { border-color:var(--green); box-shadow:0 0 16px rgba(0,230,118,0.15); }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .aviso-emoji { font-size:3.5rem; margin-bottom:12px; }
        .aviso-texto { font-family:'Rajdhani',sans-serif; font-size:1.8rem; font-weight:700; letter-spacing:2px; color:var(--muted); transition:color 0.3s; }
        .aviso-card.peligro .aviso-texto { color:var(--red); }
        .aviso-card.precaucion .aviso-texto { color:var(--yellow); }
        .aviso-card.libre .aviso-texto { color:var(--green); }
        .log-card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:16px; width:100%; max-width:400px; }
        .log-title { font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
        #log { font-size:0.8rem; color:var(--muted); max-height:120px; overflow-y:auto; line-height:1.8; }
        #log .entry { color:var(--text); }
        #log .entry.error { color:var(--red); }
        #log .entry.ok { color:var(--green); }
        .footer { margin-top:24px; font-size:0.75rem; color:var(--muted); text-align:center; }
    </style>
</head>
<body>
    <h1>🦺 Chaleco Invidente</h1>
    <p class="subtitle">Sistema de detección de obstáculos</p>
    <div class="card">
        <div class="status-row">
            <div class="dot" id="dot"></div>
            <span id="statusText">Desconectado</span>
        </div>
        <button id="btnConectar" onclick="conectar()">Conectar micro:bit</button>
    </div>
    <div class="aviso-card" id="avisoCard">
        <div class="aviso-emoji" id="avisoEmoji">📡</div>
        <div class="aviso-texto" id="avisoTexto">ESPERANDO...</div>
    </div>
    <div class="log-card">
        <div class="log-title">📋 Registro</div>
        <div id="log">Inicia la conexión para comenzar...</div>
    </div>
    <div class="footer">Feria de Tecnología · 3º ESO</div>
<script>
    const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const synth = window.speechSynthesis;
    let ultimoMensaje = '', ultimoTiempo = 0;

    function log(texto, tipo='') {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'entry ' + tipo;
        const hora = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        entry.textContent = `[${hora}] ${texto}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function setEstado(texto, conectado=false) {
        document.getElementById('statusText').textContent = texto;
        document.getElementById('dot').className = 'dot' + (conectado ? ' connected' : '');
    }

    async function conectar() {
        try {
            const btn = document.getElementById('btnConectar');
            btn.disabled = true;
            setEstado('Buscando micro:bit...');
            log('Buscando micro:bit...');
            const device = await navigator.bluetooth.requestDevice({
                filters: [{namePrefix: 'BBC micro:bit'}],
                optionalServices: [UART_SERVICE]
            });
            log('Dispositivo encontrado: ' + device.name, 'ok');
            setEstado('Conectando...');
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE);
            const characteristic = await service.getCharacteristic(UART_TX);
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', recibirDatos);
            setEstado('✅ Conectado a ' + device.name, true);
            log('¡Conectado! Esperando datos del sensor...', 'ok');
            btn.textContent = '✅ Conectado';
            btn.style.borderColor = 'var(--muted)';
            btn.style.color = 'var(--muted)';
            device.addEventListener('gattserverdisconnected', () => {
                setEstado('Desconectado', false);
                log('micro:bit desconectado', 'error');
                btn.disabled = false;
                btn.textContent = 'Conectar micro:bit';
                btn.style.borderColor = 'var(--green)';
                btn.style.color = 'var(--green)';
                setAviso('📡', 'ESPERANDO...', '');
            });
        } catch(error) {
            setEstado('Error de conexión', false);
            log('Error: ' + error.message, 'error');
            document.getElementById('btnConectar').disabled = false;
        }
    }

    function recibirDatos(event) {
        const mensaje = new TextDecoder().decode(event.target.value).trim();
        const ahora = Date.now();
        log('Recibido: ' + mensaje);
        if (mensaje === 'PELIGRO') {
            setAviso('🚨', 'PELIGRO DELANTE', 'peligro');
            if (ultimoMensaje !== 'PELIGRO' || ahora - ultimoTiempo > 3000) {
                hablar('Peligro delante'); vibrar(800);
                ultimoMensaje = 'PELIGRO'; ultimoTiempo = ahora;
            }
        } else if (mensaje === 'PRECAUCION') {
            setAviso('⚠️', 'PRECAUCIÓN', 'precaucion');
            if (ultimoMensaje !== 'PRECAUCION' || ahora - ultimoTiempo > 3000) {
                hablar('Precaución, objeto cercano'); vibrar(400);
                ultimoMensaje = 'PRECAUCION'; ultimoTiempo = ahora;
            }
        } else {
            setAviso('✅', 'CAMINO LIBRE', 'libre');
            ultimoMensaje = 'LIBRE';
        }
    }

    function setAviso(emoji, texto, clase) {
        document.getElementById('avisoCard').className = 'aviso-card ' + clase;
        document.getElementById('avisoEmoji').textContent = emoji;
        document.getElementById('avisoTexto').textContent = texto;
    }

    function hablar(texto) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(texto);
        u.lang = 'es-ES'; u.rate = 0.9;
        synth.speak(u);
    }

    function vibrar(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
</script>
</body>
</html>
